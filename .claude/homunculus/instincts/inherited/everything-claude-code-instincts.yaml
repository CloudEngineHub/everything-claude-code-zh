# Everything Claude Code 测试运行器

## 操作

使用仓库现有的基于 Node 的测试流程：首先针对 `*.test.js` 文件，然后使用 `node tests/run-all.js` 或 `npm test` 进行更广泛的验证。

## 证据

- 仓库使用 `tests/run-all.js` 作为中央测试编排器。
- 测试文件在钩子、CI 和集成覆盖率中遵循 `*.test.js` 命名模式。

