# Everything Claude Code 学习精选

## 操作

优先使用一小组准确的本能，而不是批量生成的、重复的或矛盾的本能。

## 证据

- 自动生成的本能转储可能重复规则、将触发器扩展得太远，或保留占位符检测器输出。
- 精选的本能更容易导入、审计和信任，在持续学习工作流中。
