# Everything Claude Code JS 文件命名

## 操作

JavaScript 和 TypeScript 模块文件名优先使用 camelCase，技能或命令目录保持 kebab-case。

## 证据

- `scripts/` 和测试辅助工具主要使用 camelCase 模块名称。
- `skills/` 和 `commands/` 目录一致使用 kebab-case。

