# Everything Claude Code 跨平台同步

## 操作

将根仓库视为事实来源，然后仅在功能实际存在的地方将已发布的更改镜像到 `.cursor/`、`.codex/`、`.opencode/` 和 `.agents/`。

## 证据

- ECC 维护多个特定于 harness 的表面，具有重叠但不相同的文件。
- 最安全的工作流程是根优先，然后进行显式同等更新。

